name: 🔄 Atualizar README Dinâmico

on:
  schedule:
    # Roda todo dia à meia-noite (UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:
    # Permite rodar o script manualmente clicando no botão no Github Actions

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Baixar o código do repositório
        uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN é gerado automaticamente pelo Github para o bot poder salvar arquivos
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: 📦 Instalar dependências
        run: npm install
        working-directory: .github/scripts
        
      - name: 🚀 Rodar o Script de Automação (Injeta Ranking)
        env:
          # Segurança: O código puxa a chave do cofre (Secrets)
          FIREBASE_ADMIN_CREDENTIALS: ${{ secrets.FIREBASE_ADMIN_CREDENTIALS }}
        run: npm start
        working-directory: .github/scripts
        
      - name: 💾 Salvar alterações no Github
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Só faz o commit se o script tiver de fato alterado o README
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs(readme): atualização automática do ranking 🏆" && git push)
